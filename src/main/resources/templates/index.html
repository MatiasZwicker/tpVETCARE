<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Iniciar Sesión</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header { text-align: center; margin-bottom: 30px; }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .logo-icon { font-size: 40px; }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitulo { color: #888; font-size: 14px; }

        .tab-buttons {
            display: flex;
            background: #f0f0f5;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #888;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab-btn.active {
            background: white;
            color: #302b63;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-container { display: none; }
        .form-container.active { display: block; }

        .role-selector { margin-bottom: 24px; }

        .role-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-options { display: flex; gap: 8px; flex-wrap: wrap; }

        .role-card { cursor: pointer; }
        .role-card input { display: none; }

        .role-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px 8px;
            min-width: 80px;
            border: 2px solid #e8e8ef;
            border-radius: 14px;
            transition: all 0.3s ease;
            background: #fafafe;
        }

        .role-card input:checked + .role-content {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .role-card:hover .role-content {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .role-icon { font-size: 26px; }
        .role-text { font-size: 12px; font-weight: 600; color: #444; }

        .role-card input:checked + .role-content .role-text { color: #302b63; }

        .input-group { margin-bottom: 18px; }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8ef;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fafafe;
            color: #333;
            outline: none;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: white;
        }

        .input-group input::placeholder { color: #bbb; }

        .forgot-password { text-align: right; margin-bottom: 22px; }

        .forgot-password a {
            color: #667eea;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password a:hover { color: #764ba2; text-decoration: underline; }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            text-align: center;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 480px) {
            .login-card { padding: 28px 20px; }
            .role-options { gap: 6px; }
            .role-content { padding: 10px 6px; }
            .role-icon { font-size: 22px; }
            .role-text { font-size: 11px; }
            .logo h1 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <span class="logo-icon">🐾</span>
                    <h1>PetCare</h1>
                </div>
                <p class="subtitulo">Sistema de Gestión Veterinaria</p>
            </div>

            <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
            <div th:if="${errorLogin}" class="alert alert-error" th:text="${errorLogin}"></div>
            <div th:if="${errorRegistro}" class="alert alert-error" th:text="${errorRegistro}"></div>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('login')">Iniciar Sesión</button>
                <button class="tab-btn" onclick="showTab('register')">Registrarse</button>
            </div>

            <div id="loginForm" class="form-container active">
                <form th:action="@{/login}" method="post">
                    <div class="role-selector">
                        <label class="role-label">Ingresar como</label>
                        <div class="role-options">
                            <label class="role-card">
                                <input type="radio" name="rol" value="dueno" checked>
                                <div class="role-content">
                                    <span class="role-icon">👤</span>
                                    <span class="role-text">Dueño</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="veterinario">
                                <div class="role-content">
                                    <span class="role-icon">👨‍⚕️</span>
                                    <span class="role-text">Veterinario</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="administrador">
                                <div class="role-content">
                                    <span class="role-icon">⚙️</span>
                                    <span class="role-text">Admin</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="paseador">
                                <div class="role-content">
                                    <span class="role-icon">🐕</span>
                                    <span class="role-text">Paseador</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="peluquero">
                                <div class="role-content">
                                    <span class="role-icon">✂️</span>
                                    <span class="role-text">Peluquero</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="adiestrador">
                                <div class="role-content">
                                    <span class="role-icon">🎯</span>
                                    <span class="role-text">Adiestrador</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="cuidador">
                                <div class="role-content">
                                    <span class="role-icon">🏠</span>
                                    <span class="role-text">Cuidador</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-primary">Iniciar Sesión</button>
                </form>
            </div>

            <div id="registerForm" class="form-container">
                <form th:action="@{/register}" method="post">
                    <div class="role-selector">
                        <label class="role-label">Registrarse como</label>
                        <div class="role-options">
                            <label class="role-card">
                                <input type="radio" name="rol" value="dueno" checked>
                                <div class="role-content">
                                    <span class="role-icon">👤</span>
                                    <span class="role-text">Dueño</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="veterinario">
                                <div class="role-content">
                                    <span class="role-icon">👨‍⚕️</span>
                                    <span class="role-text">Veterinario</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="administrador">
                                <div class="role-content">
                                    <span class="role-icon">⚙️</span>
                                    <span class="role-text">Admin</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="paseador">
                                <div class="role-content">
                                    <span class="role-icon">🐕</span>
                                    <span class="role-text">Paseador</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="peluquero">
                                <div class="role-content">
                                    <span class="role-icon">✂️</span>
                                    <span class="role-text">Peluquero</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="adiestrador">
                                <div class="role-content">
                                    <span class="role-icon">🎯</span>
                                    <span class="role-text">Adiestrador</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="cuidador">
                                <div class="role-content">
                                    <span class="role-icon">🏠</span>
                                    <span class="role-text">Cuidador</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="reg-nombre">Nombre</label>
                        <input type="text" id="reg-nombre" name="nombre" placeholder="Juan" required>
                    </div>

                    <div class="input-group">
                        <label for="reg-apellido">Apellido</label>
                        <input type="text" id="reg-apellido" name="apellido" placeholder="Pérez" required>
                    </div>

                    <div class="input-group">
                        <label for="reg-email">Correo electrónico</label>
                        <input type="email" id="reg-email" name="email" placeholder="tu@correo.com" required>
                    </div>

                    <div class="input-group">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" id="reg-password" name="password" placeholder="Mínimo 6 caracteres" required>
                    </div>

                    <div class="input-group">
                        <label for="reg-confirm">Confirmar contraseña</label>
                        <input type="password" id="reg-confirm" name="confirmPassword" placeholder="Repite la contraseña" required>
                    </div>

                    <button type="submit" class="btn-primary">Crear Cuenta</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
        }

        var errorRegistro = /*[[${errorRegistro}]]*/ null;
        if (errorRegistro) {
            showTab('register');
        }
    </script>
</body>
</html>
